<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="coupleModel" src="couple.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="0 2 2" intensity="0.8"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" 
                animation="property: position; to: 0 0.1 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        
        <a-gltf-model 
          src="#coupleModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.02 0.02 0.02">
        </a-gltf-model>

        <a-text 
          value="RAJU\nWEDS\nKUMARI" 
          color="#FF0000" 
          align="center" 
          position="0 1 0.1" 
          scale="1 1 1"
          width="5"
          wrap-count="15"
          font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
          animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true; easing: easeInOutQuad">
        </a-text>

      </a-entity>
      
    </a-scene>
  </body>
</html>
