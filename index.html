<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      // This small script ensures the text always faces the camera
      AFRAME.registerComponent('look-at-camera', {
        tick: function () {
          this.el.object3D.lookAt(this.el.sceneEl.camera.el.object3D.position);
        }
      });
    </script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* Hide the VR button to keep it clean */
      .a-enter-vr { display: none; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="coupleModel" src="couple.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 2 2" intensity="1"></a-light>

      <a-entity mindar-image-target="targetIndex: 0" 
                animation="property: position; to: 0 0.1 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
        
        <a-gltf-model 
          src="#coupleModel" 
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.02 0.02 0.02">
        </a-gltf-model>

        <a-entity position="0 2.2 0.2" look-at-camera>
          <a-text 
            value="RAJU\nWEDS\nKUMARI" 
            color="#FF0000" 
            align="center" 
            width="8"
            wrap-count="12"
            font="https://cdn.aframe.io/fonts/DejaVu-sdf.json"
            animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true; easing: easeInOutQuad">
          </a-text>
        </a-entity>

      </a-entity>
      
    </a-scene>
  </body>
</html>
