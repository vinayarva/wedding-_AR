<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-box position="0 0 0" scale="0.5 0.5 0.1" material="color: yellow; opacity: 0.8"></a-box>

        <a-text 
          value="RAJU\nWEDS\nKUMARI" 
          color="#FF0000" 
          align="center" 
          position="0 0 0.1" 
          scale="2 2 2"
          width="4"
          wrap-count="10">
        </a-text>

        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
           <a-text value="❤" color="#FF0000" position="0.8 0 0" scale="3 3 3"></a-text>
        </a-entity>

      </a-entity>
      
    </a-scene>
  </body>
</html>
